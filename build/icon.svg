<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="#1a1b26"/>

  <!-- Subtle top highlight -->
  <rect x="0" y="0" width="1024" height="512" rx="220" fill="#1f2335" opacity="0.5"/>

  <!-- Terminal window -->
  <rect x="100" y="180" width="824" height="600" rx="20" fill="#0d1117"/>

  <!-- Title bar -->
  <rect x="100" y="180" width="824" height="56" rx="20" fill="#1f2335"/>
  <rect x="100" y="210" width="824" height="26" fill="#1f2335"/>

  <!-- Traffic lights -->
  <circle cx="152" cy="208" r="13" fill="#ff5f57"/>
  <circle cx="195" cy="208" r="13" fill="#febc2e"/>
  <circle cx="238" cy="208" r="13" fill="#28c840"/>

  <!-- Prompt > (two lines forming arrow) -->
  <line x1="148" y1="310" x2="210" y2="370" stroke="#5af78e" stroke-width="28" stroke-linecap="round"/>
  <line x1="210" y1="370" x2="148" y2="430" stroke="#5af78e" stroke-width="28" stroke-linecap="round"/>

  <!-- Cursor block -->
  <rect x="234" y="312" width="30" height="100" rx="6" fill="#e8e8e8"/>

  <!-- SSH Key icon (large, centered) -->
  <!-- Key ring -->
  <circle cx="410" cy="580" r="96" fill="none" stroke="#57c7ff" stroke-width="40"/>
  <!-- Key hole -->
  <circle cx="410" cy="580" r="28" fill="#57c7ff"/>

  <!-- Key shaft -->
  <rect x="488" y="558" width="220" height="44" rx="22" fill="#57c7ff"/>

  <!-- Key teeth (notches pointing down) -->
  <rect x="636" y="602" width="34" height="52" rx="10" fill="#57c7ff"/>
  <rect x="694" y="602" width="34" height="38" rx="10" fill="#57c7ff"/>

  <!-- Lock shackle (arc above key ring) -->
  <path d="M340 490 Q340 400 410 400 Q480 400 480 490" fill="none" stroke="#7aa2f7" stroke-width="34" stroke-linecap="round"/>

  <!-- Horizontal line decorators (like terminal lines) -->
  <rect x="148" y="468" width="120" height="10" rx="5" fill="#7aa2f7" opacity="0.5"/>
  <rect x="148" y="494" width="80" height="10" rx="5" fill="#7aa2f7" opacity="0.3"/>

  <!-- Bottom subtle glow line -->
  <rect x="312" y="736" width="400" height="6" rx="3" fill="#57c7ff" opacity="0.2"/>
</svg>
