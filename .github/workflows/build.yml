name: Build and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Vite App
        run: npm run build

      - name: Build Electron App (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never

      - name: Build Electron App (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish never

      - name: Build Electron App (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish never

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: last-ssh-${{ matrix.os }}
          path: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.zip
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Linux build artifact
        uses: actions/download-artifact@v4
        with:
          name: last-ssh-ubuntu-latest
          path: release-assets/linux

      - name: Download macOS build artifact
        uses: actions/download-artifact@v4
        with:
          name: last-ssh-macos-latest
          path: release-assets/macos

      - name: Download Windows build artifact
        uses: actions/download-artifact@v4
        with:
          name: last-ssh-windows-latest
          path: release-assets/windows

      - name: Publish release with assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: last-ssh-${{ github.run_number }}
          name: Last SSH Build #${{ github.run_number }}
          body: |
            Automated build from commit `${{ github.sha }}` on branch `${{ github.ref_name }}`.
            Download links are available as release assets.
          files: |
            release-assets/linux/*
            release-assets/macos/*
            release-assets/windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
