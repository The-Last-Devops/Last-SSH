apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: last-ssh
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket upgrade — nginx ingress xử lý tự động khi set http version 1.1
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # Tắt buffering để data SSH/terminal stream realtime
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ssh.yourdomain.com   # <-- thay bằng domain của bạn
  rules:
    - host: ssh.yourdomain.com  # <-- thay bằng domain của bạn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: last-ssh
                port:
                  name: http
